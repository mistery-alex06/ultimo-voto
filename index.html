<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guerra all’Ultimo Voto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="guv.png">
    <!-- Firebase configuration is handled in multiplayer.js using modular SDK v10 -->
</head>

<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="overlay show">
        <div class="modal login-modal">
            <h1 style="color: var(--primary); text-shadow: 0 0 15px var(--primary);">Guerra all'Ultimo Voto</h1>
            <p style="margin-bottom: 20px; opacity: 0.8;">Inserisci il tuo nome per entrare nella Lobby</p>
            <input type="text" id="username-input" placeholder="Il tuo nome..." 
                style="padding: 12px 20px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; width: 100%; margin-bottom: 20px; font-size: 1rem; outline: none;">
            <button class="btn-restart" onclick="window.onLoginSubmit()" style="width: 100%;">ENTRA NELLA LOBBY</button>
        </div>
    </div>

    <!-- LOBBY CONTAINER -->
    <div id="lobby-container" class="overlay hidden">
        <div class="modal lobby-window">
            <div class="lobby-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">Lobby Cloud</h2>
                <div id="user-display" style="font-weight: 800; color: var(--accent);"></div>
            </div>
            <div class="lobby-grid">
                <div class="leaderboard-col">
                    <h3 style="font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px; opacity: 0.7;">Classifica Cloud</h3>
                    <div class="table-wrapper">
                        <table id="leaderboard-table">
                            <thead>
                                <tr>
                                    <th>Giocatore</th>
                                    <th>V</th>
                                    <th>S</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Dinamico -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="actions-col">
                    <h3 style="font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px; opacity: 0.7;">Nuova Partita</h3>
                    <div class="lobby-buttons">
                        <button class="btn-restart" onclick="window.showOfflineMenu()" style="width: 100%; margin-bottom: 10px;">OFFLINE (IA)</button>
                        <button class="btn-restart" onclick="window.showOnlineMenu()" style="width: 100%; margin-bottom: 10px; background: var(--secondary);">MULTIGIOCATORE ONLINE</button>
                        <button class="btn-restart" onclick="window.logoutUser()" style="width: 100%; margin-top: 20px; background: #ff4444; font-size: 0.8rem;">LOGOUT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-container hidden">
        <!-- THEME SELECTOR -->
        <div class="theme-selector">
            <button onclick="document.body.setAttribute('data-theme', 'dark')" title="Dark Theme">🌌</button>
            <button onclick="document.body.setAttribute('data-theme', 'light')" title="Light Theme">☀️</button>
            <button onclick="document.body.setAttribute('data-theme', 'cyberpunk')" title="Cyberpunk Theme">🤖</button>
            <button onclick="document.body.setAttribute('data-theme', 'nature')" title="Nature Theme">🌿</button>
            <button onclick="document.body.setAttribute('data-theme', 'sunset')" title="Sunset Theme">🌇</button>
            <button onclick="document.body.setAttribute('data-theme', 'ocean')" title="Ocean Theme">🌊</button>
            <button onclick="document.body.setAttribute('data-theme', 'midnight')" title="Midnight Theme">🌑</button>
            <button onclick="document.body.setAttribute('data-theme', 'desert')" title="Desert Theme">🏜️</button>
        </div>

        <!-- AI HAND (Hidden) -->
        <div class="opponent-hand-container">
            <div class="opponent-hand" id="opponent-hand"></div>
        </div>

        <!-- SCOREBOARD -->
        <div class="scoreboard" id="scoreboard">
            <!-- stats injected here dynamically -->
        </div>

        <div class="deck-container">
            <div class="deck-count" id="deck-count">0</div>
        </div> 

        <!-- ARENA -->
        <div class="arena">
            <div id="turn-indicator" style="font-weight: 800; font-size: 1.5rem; text-transform: uppercase;">Inizia la
                Partita</div>

            <div class="played-cards" id="played-cards-area">
                <!-- dynamic slots injected here -->
            </div>
        </div>

        <!-- LOG -->
        <div class="log-panel">
            <div class="log-title">LOG AZIONI</div>
            <div class="log-content" id="log-content">
                <div class="log-entry">Benvenuti a Guerra all'Ultimo Voto!</div>
            </div>
        </div>
        <!-- BOTTOM HAND -->
        <div class="hand-container">
            <div style="display: flex; gap: 20px; align-items: flex-end; margin-bottom: 10px;">
                <div class="potions-container" id="player-potions"></div>
                <button class="btn-attack" id="btn-attack" onclick="onAttackClicked()" style="display: none;">
                    <div>⚔️</div>
                    <div style="font-size: 0.8rem">ATTACCA!</div>
                </button>
                <button class="btn-attack" id="btn-pass" onclick="onPassClicked()"
                    style="display: none; background: var(--secondary);">
                    <div>⏭️</div>
                    <div style="font-size: 0.8rem">PASSA</div>
                </button>
            </div>
            <div class="hand" id="player-hand">
                <!-- Cards injected here -->
            </div>
        </div>
    </div>

    <!-- SETUP OVERLAY -->
    <div class="overlay show" id="setup-overlay">
        <div class="modal setup-modal">
            <h1>Impostazioni Partita</h1>

            <div id="level-1-menu">
                <button class="btn-restart" onclick="window.showOfflineMenu()" style="margin: 10px; width: 80%;">GIOCA
                    OFFLINE</button>
                <button class="btn-restart" onclick="window.showOnlineMenu()" style="margin: 10px; width: 80%;">GIOCA
                    ONLINE</button>
            </div>

            <div id="level-2-menu" class="hidden">
                <button class="btn-back" onclick="window.showLevel1()"
                    style="margin-bottom: 15px; cursor: pointer; background: transparent; color: white; border: 1px solid white; padding: 5px 15px; border-radius: 5px;">&larr;
                    Indietro</button>
                <div class="setup-form" style="margin-top: 0;">

                    <div id="offline-setup" class="hidden">
                        <div class="setup-row">
                            <label>Modalità:</label>
                            <select id="mode-select" onchange="window.toggleOfflineMode()">
                                <option value="1v1">1v1 contro IA</option>
                                <option value="2v2">2v2 contro IA</option>
                            </select>
                        </div>
                    </div>

                    <div id="common-setup" class="hidden">
                        <div class="setup-row">
                            <label>P1 Personalità (Tu):</label>
                            <select id="p1-pers">
                                <option value="">Nessuna / Normale</option>
                                <option value="Secchione">Secchione (+20% Def, +10% Studio, -10% Atk)</option>
                                <option value="Disperato">Disperato (+50% Atk se Vita < 300, -10% Def)</option>
                                <option value="Caotico">Caotico (Effetti casuali)</option>
                                <option value="Raccomandato">Raccomandato (+20% Autorità, 20% Evasione)</option>
                            </select>
                        </div>

                        <div class="setup-row hidden" id="setup-p2">
                            <label>P2 Personalità (Alleato):</label>
                            <select id="p2-pers">
                                <option value="">Nessuna / Normale</option>
                                <option value="Secchione">Secchione (+20% Def, +10% Studio, -10% Atk)</option>
                                <option value="Disperato">Disperato (+50% Atk se Vita < 300, -10% Def)</option>
                                <option value="Caotico">Caotico (Effetti casuali)</option>
                                <option value="Raccomandato">Raccomandato (+20% Autorità, 20% Evasione)</option>
                            </select>
                        </div>
                    </div>

                    <div id="online-setup" class="hidden"
                        style="margin-top: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
                        <label>Codice Stanza:</label>
                        <input type="text" id="room-code-input" placeholder="Inserisci o attendi codice"
                            style="padding: 5px; width: 100%; margin-bottom: 5px;" />
                        <button class="btn-restart" id="btn-create-room" onclick="window.onCreateRoom()"
                            style="font-size: 0.9rem; margin-bottom: 5px; width: 100%;">CREA STANZA</button>
                        <button class="btn-restart" id="btn-join-room" onclick="window.onJoinRoom()"
                            style="font-size: 0.9rem; width: 100%;">UNISCITI A STANZA</button>
                        <div id="room-status" style="margin-top: 5px; color: var(--accent); font-weight: bold;"></div>
                    </div>

                </div>
                <button class="btn-restart hidden" id="btn-start-offline" onclick="window.startGame()"
                    style="width: 100%;">INIZIA PARTITA</button>
            </div>
        </div>
    </div>

    <!-- GAME OVER MODAL -->
    <div class="overlay" id="game-over-overlay">
        <div class="modal">
            <h1 id="victory-text">VITTORIA!</h1>
            <button class="btn-restart" onclick="location.reload()">GIOCA ANCORA</button>
        </div>
    </div>

    <!-- FLASH NEWS BANNER -->
    <div id="flash-news-banner">FLASH NEWS!</div>

    <!-- SCRIPTS -->
    <script type="module" src="engine.js"></script>
</body>

</html>
