<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guerra all'Ultimo Voto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="overlay show-flex">
        <div class="modal">
            <h1>Guerra all'Ultimo Voto</h1>
            <p>Inserisci il tuo nome per giocare</p>
            <input type="text" id="username-input" placeholder="Nome utente..." maxlength="15">
            <button class="btn-restart" onclick="window.onLoginSubmit()">ENTRA</button>
        </div>
    </div>

    <!-- LOBBY CONTAINER -->
    <div id="lobby-container" class="overlay hidden">
        <div class="modal lobby-window">
            <div class="lobby-header">
                <h2>Lobby Cloud</h2>
                <div id="user-display"></div>
            </div>
            <div class="lobby-grid">
                <div class="leaderboard-col">
                    <h3>Classifica Globale</h3>
                    <table id="leaderboard-table">
                        <thead>
                            <tr><th>Player</th><th>W</th><th>L</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="modes-col">
                    <h3>Scegli Modalità</h3>
                    <button class="btn-restart" onclick="window.startGame('1v1')">Offline 1v1</button>
                    <button class="btn-restart" onclick="window.startGame('2v2')">Offline 2v2</button>
                    <button class="btn-restart" onclick="window.onOnlineMode()">Online Multiplayer</button>
                    <button class="btn-restart" onclick="window.logoutUser()" style="background: #ff4444; margin-top: 20px;">ESCI</button>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME CONTAINER -->
    <div class="game-container hidden">
        <div class="theme-selector">
            <button onclick="document.body.setAttribute('data-theme', 'dark')">🌌</button>
            <button onclick="document.body.setAttribute('data-theme', 'light')">☀️</button>
            <button onclick="document.body.setAttribute('data-theme', 'cyberpunk')">🤖</button>
        </div>
        <div class="opponent-hand-container"><div class="opponent-hand" id="opponent-hand"></div></div>
        <div class="scoreboard" id="scoreboard"></div>
        <div class="deck-container"><div class="deck-count" id="deck-count">0</div></div>
        <div class="arena">
            <div id="turn-indicator">Inizia</div>
            <div class="played-cards" id="played-cards-area"></div>
        </div>
        <div class="log-panel">
            <div class="log-title">LOG</div>
            <div class="log-content" id="log-content"></div>
        </div>
        <div class="hand-container">
            <div id="player-potions"></div>
            <button id="btn-attack" onclick="window.onAttackClicked()" style="display:none">ATTACCA</button>
            <button id="btn-pass" onclick="window.onPassClicked()" style="display:none">PASSA</button>
            <div class="hand" id="player-hand"></div>
        </div>
    </div>

    <!-- SETUP OVERLAY -->
    <div id="setup-overlay" class="overlay hidden">
        <div class="modal">
            <h2>Multiplayer</h2>
            <input type="text" id="room-code-input" placeholder="Codice Stanza">
            <button onclick="window.createOnlineRoom()">CREA</button>
            <button onclick="window.joinOnlineRoom()">UNISCITI</button>
            <button onclick="window.backToLobby()">INDIETRO</button>
            <div id="room-status"></div>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over-overlay" class="overlay hidden">
        <div class="modal">
            <h1 id="victory-text"></h1>
            <button onclick="location.reload()">LOBBY</button>
        </div>
    </div>

    <script type="module" src="engine.js"></script>
</body>
</html>
